<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Emerald-Style Game</title>
    <style>
        body { margin: 0; overflow: hidden; }
        canvas { background: #87CEFA; display: block; margin: auto; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 600;

        let player = { x: 400, y: 300, width: 50, height: 50, color: 'red' };

        function drawPlayer() {
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.width, player.height);
        }

        function update() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawPlayer();
        }

        document.addEventListener('keydown', (event) => {
            switch (event.key) {
                case 'ArrowUp':
                case 'w':
                    player.y -= 5;
                    break;
                case 'ArrowDown':
                case 's':
                    player.y += 5;
                    break;
                case 'ArrowLeft':
                case 'a':
                    player.x -= 5;
                    break;
                case 'ArrowRight':
                case 'd':
                    player.x += 5;
                    break;
                case 'Enter':
                    alert("You entered the room and found a note!");
                    window.location.href = "index.html"; // Redirects to the romantic surprise.
                    break;
            }
            update();
        });

        update();
    </script>
</body>
</html>
